name: build-apk

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Generate gradle wrapper
        run: gradle wrapper --gradle-version 8.10.2 --distribution-type bin

      - name: Download sherpa-onnx AAR
        run: |
          mkdir -p horizons/libs
          curl -fL -o horizons/libs/sherpa-onnx-1.13.2.aar \
            https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.13.2/sherpa-onnx-1.13.2.aar

      - name: Build Horizons debug APK
        run: ./gradlew :horizons:assembleDebug -PnexaEnabled=false --no-daemon --stacktrace

      - name: Build Watchdog debug APK
        run: ./gradlew :watchdog:assembleDebug --no-daemon --stacktrace

      - name: Stage APKs
        run: |
          mkdir -p out
          cp horizons/build/outputs/apk/debug/horizons-debug.apk out/horizons.apk
          cp watchdog/build/outputs/apk/debug/watchdog-debug.apk out/watchdog.apk
          ls -la out

      - name: Upload artifacts (Actions tab)
        uses: actions/upload-artifact@v4
        with:
          name: horizons-apks
          path: out/*.apk
          if-no-files-found: error

      - name: Publish "latest-debug" release (stable download URL)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-debug
          name: latest-debug (auto)
          body: |
            Auto-built from ${{ github.sha }} on ${{ github.ref_name }}.
            Install Watchdog first, then Horizons.
          files: |
            out/horizons.apk
            out/watchdog.apk
          prerelease: true
          make_latest: false
