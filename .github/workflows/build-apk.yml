name: build-apk

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Generate gradle wrapper
        run: gradle wrapper --gradle-version 8.10.2 --distribution-type bin

      - name: Verify sherpa-onnx AAR
        run: |
          if [ -f horizons/libs/sherpa-onnx-1.13.2.aar ]; then
            echo "AAR committed in repo — skipping download"
          else
            echo "AAR missing — downloading"
            mkdir -p horizons/libs
            curl -fL --retry 3 -o horizons/libs/sherpa-onnx-1.13.2.aar \
              https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.13.2/sherpa-onnx-1.13.2.aar \
            || curl -fL --retry 3 -o horizons/libs/sherpa-onnx-1.13.2.aar \
              https://huggingface.co/csukuangfj2/sherpa-onnx-libs/resolve/main/android/aar/sherpa-onnx-1.13.2.aar
          fi
          unzip -l horizons/libs/sherpa-onnx-1.13.2.aar | grep -q classes.jar

      - name: Cache NDK + ORT
        uses: actions/cache@v4
        with:
          path: |
            /opt/android-ndk-r27c
            /opt/ort-android
          key: ndk-r27c-ort-1.22.0

      - name: Download Android NDK r27c
        run: |
          if [ ! -d /opt/android-ndk-r27c ]; then
            curl -fL -o /tmp/ndk.zip \
              https://dl.google.com/android/repository/android-ndk-r27c-linux.zip
            unzip -q /tmp/ndk.zip -d /opt
            rm /tmp/ndk.zip
          fi

      - name: Download ORT Android headers + libs
        run: |
          if [ ! -d /opt/ort-android ]; then
            curl -fL -o /tmp/ort.aar \
              https://repo1.maven.org/maven2/com/microsoft/onnxruntime/onnxruntime-android/1.22.0/onnxruntime-android-1.22.0.aar
            mkdir -p /opt/ort-android
            unzip -q /tmp/ort.aar -d /opt/ort-android
            rm /tmp/ort.aar
          fi

      - name: Build ort_engine daemon (arm64-v8a)
        run: |
          export ANDROID_NDK=/opt/android-ndk-r27c
          export ORT_ROOT=/opt/ort-android
          cmake -S daemon -B daemon/build \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-31 \
            -DCMAKE_BUILD_TYPE=Release \
            -DORT_ROOT=$ORT_ROOT
          cmake --build daemon/build --config Release -j$(nproc)
          file daemon/build/ort_engine

      - name: Package daemon into APK native libs
        # Ships ort_engine INSIDE the APK as a fake .so. useLegacyPackaging=true
        # extracts it to nativeLibraryDir at install — the only exec()-allowed
        # location for targetSdk 29+. No more manual adb push of daemon binaries.
        run: |
          mkdir -p horizons/src/main/jniLibs/arm64-v8a
          cp daemon/build/ort_engine horizons/src/main/jniLibs/arm64-v8a/libort_engine.so

      - name: Build Horizons debug APK
        run: ./gradlew :horizons:assembleDebug -PnexaEnabled=false --no-daemon --stacktrace

      - name: Stage artifacts
        run: |
          mkdir -p out
          cp horizons/build/outputs/apk/debug/horizons-debug.apk out/horizons.apk
          cp daemon/build/ort_engine out/ort_engine
          cp /opt/ort-android/jni/arm64-v8a/libonnxruntime.so out/libonnxruntime.so
          ls -la out

      - name: Upload artifacts (Actions tab)
        uses: actions/upload-artifact@v4
        with:
          name: horizons-release
          path: out/*
          if-no-files-found: error

      - name: Publish "latest-debug" release (stable download URL)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-debug
          name: latest-debug (auto)
          body: |
            Auto-built from ${{ github.sha }} on ${{ github.ref_name }}.
            horizons.apk is self-contained: ort_engine + libonnxruntime.so ride
            inside it and install automatically — no manual push needed.
            (Standalone ort_engine/libonnxruntime.so files kept for Termux workflows.)
          files: |
            out/horizons.apk
            out/ort_engine
            out/libonnxruntime.so
          prerelease: true
          make_latest: false
